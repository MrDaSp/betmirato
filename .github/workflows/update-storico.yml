name: Aggiorna Storico Estrazioni

on:
  schedule:
    - cron: '0 21 * * 2,4,6'  # Mar, Gio, Sab alle 21:00 UTC (22:00 IT)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Scarica storico aggiornato
        run: |
          curl -sL "https://www.interlotto.it/downloadFiles/downloadFile.php?anno=storico01-oggi" -o storico01-oggi.txt
          head -5 storico01-oggi.txt
          wc -l storico01-oggi.txt
      - name: Commit e push se cambiato
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add storico01-oggi.txt
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento"
          else
            git commit -m "📊 Storico aggiornato $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
