<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - BetMirato</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="storage.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --border: #2a3550;
            --text-primary: #e8ecf4;
            --text-secondary: #8b98b8;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --accent-blue: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .auth-box { background: var(--bg-card); padding: 2.5rem; border-radius: 12px; border: 1px solid var(--border); width: 400px; max-width: 90vw; }
        .auth-box h1 { font-size: 1.8rem; color: var(--accent-green); margin-bottom: 0.5rem; text-align: center; }
        .form-input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: var(--bg-secondary); border: 1px solid var(--border); color: white; border-radius: 8px; }
        .btn-auth { width: 100%; padding: 0.8rem; background: var(--accent-green); border: none; color: black; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 0.5rem; }
        .btn-auth.secondary { background: var(--bg-secondary); color: white; border: 1px solid var(--border); margin-top: 1rem; }
        .auth-error { font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h1>Crea Account</h1>
        <p class="text-center" style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:0.9rem;">Unisciti a BetMirato per accedere alle vere Value Bet Europee.</p>
        
        <div id="regMessage" class="auth-error"></div>
        
        <input type="email" id="email" class="form-input" placeholder="Indirizzo Email">
        <input type="password" id="password" class="form-input" placeholder="Scegli una Password (min. 6 caratteri)">
        
        <button class="btn-auth" id="btnRegister" onclick="eseguiRegistrazione()">Registrati Ora</button>
        <button class="btn-auth secondary" onclick="window.location.href='index.html'">← Torna al Login</button>
    </div>

    <script>
        initSupabase();

        async function eseguiRegistrazione() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btnRegister');
            const msgBox = document.getElementById('regMessage');
            
            if(!e || !p) {
                msgBox.style.color = "var(--accent-red)";
                msgBox.textContent = "Compila tutti i campi.";
                return;
            }

            btn.textContent = "Creazione in corso...";
            btn.disabled = true;

            try {
                // Chiama la funzione sbSignUp importata da storage.js
                await sbSignUp(e, p, "");
                msgBox.style.color = "var(--accent-green)";
                msgBox.innerHTML = "✅ <b>Registrazione Completata!</b><br><br>Ti abbiamo inviato un link di conferma sulla tua Email.<br>Cliccalo per sbloccare l'accesso al Portale.";
                btn.classList.add('hidden');
                document.getElementById('email').classList.add('hidden');
                document.getElementById('password').classList.add('hidden');
            } catch(err) {
                msgBox.style.color = "var(--accent-red)";
                msgBox.textContent = "Errore: " + err.message;
                btn.textContent = "Registrati Ora";
                btn.disabled = false;
            }
        }
        
        // Permetti Invio da tastiera
        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                eseguiRegistrazione();
            }
        });
    </script>
</body>
</html>
